<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPS Game</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>

    <div id="escape-menu">
      <div id="escape-panel">
        <h2>Settings</h2>

        <label>
          Mouse Sensitivity
          <input type="range" id="sensitivity-slider" min="500" max="5000" value="2000" />
          <span id="sensitivity-value">2000</span>
        </label>

        <label>
          Move Speed
          <input type="range" id="speed-slider" min="1" max="20" value="3" step="1" />
          <span id="speed-value">3</span>
        </label>

        <button id="resume-btn">Resume</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
